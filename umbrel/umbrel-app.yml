releaseNotes: >-
  v0.6 — customer-facing dashboard with self-service strategy editing,
  encrypted credential storage (Fernet at rest), hot config reload, and
  per-tier feature gating via offline-verifiable Ed25519 license tokens.
  Multi-hop smart routing (AED→USDT→BTC), maker-mode execution, funding-rate
  monitor, four composable strategy overlays (buy-the-dip, volatility-
  weighted, time-of-day, drawdown-aware). BitOasis + OKX UAE adapter verified
  live; Binance via ADGM (BTC/USDT path). 165 unit tests passing.
