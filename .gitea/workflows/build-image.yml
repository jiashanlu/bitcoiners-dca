name: Build & ship bitcoiners-dca image

on:
  push:
    branches: [main, dev]
    tags: ["v*"]

# Builds bitcoiners-dca:latest + bitcoiners-provisioner:latest on
# dockers-LXC, then ships the tarballs to ONE host based on branch:
#
#   main → 178.105.66.56  (Hetzner CCX13, prod, runs benbois + paying tenants)
#   dev  → 192.168.4.160  (home tenants-LXC, dev, runs replicated test tenants)
#
# Both hosts accept the same DEPLOY_SSH_KEY (jiashan-ai keypair). The job
# container materializes that key as a tempfile, scp's the image tarball,
# `docker load`s it, then recreates the provisioner so new tenant
# provisioning picks up the latest image. Existing tenant containers stay
# on their currently-running image — a CI run never restarts customer
# bots; the operator (or resume flow) does that explicitly.
#
# Bug history: #143 — originally referenced /root/.ssh/jiashan_ai_ed25519
# which doesn't exist in ephemeral act_runner containers. Fixed by
# materializing the key from the DEPLOY_SSH_KEY secret on each run.

jobs:
  build-and-ship:
    runs-on: dockers-lxc
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker CLI in job container
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends docker.io openssh-client >/dev/null
          docker --version

      - name: Build bitcoiners-dca:latest
        run: |
          docker build -t bitcoiners-dca:latest -t bitcoiners-dca:git-${GITEA_SHA:0:7} .

      - name: Build bitcoiners-provisioner:latest
        run: |
          docker build -f hosted/provisioner.Dockerfile \
            -t bitcoiners-provisioner:latest \
            -t bitcoiners-provisioner:git-${GITEA_SHA:0:7} .

      - name: Write deploy SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p /root/.ssh
          printf '%s' "$DEPLOY_SSH_KEY" > /root/.ssh/deploy_key
          chmod 600 /root/.ssh/deploy_key

      - name: Resolve target host from branch
        # GITHUB_REF on Gitea is `refs/heads/<branch>` for branch pushes and
        # `refs/tags/<tag>` for tag pushes. We treat tags as prod (Hetzner)
        # because we only cut versioned tags off main.
        id: target
        run: |
          case "$GITHUB_REF" in
            refs/heads/main|refs/tags/v*)
              echo "host=178.105.66.56" >> $GITHUB_OUTPUT
              echo "env=prod" >> $GITHUB_OUTPUT
              ;;
            refs/heads/dev)
              echo "host=192.168.4.160" >> $GITHUB_OUTPUT
              echo "env=dev" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unsupported ref $GITHUB_REF — refusing to deploy" >&2
              exit 1
              ;;
          esac

      - name: Save images + ship to target host
        env:
          TARGET_HOST: ${{ steps.target.outputs.host }}
          TARGET_ENV:  ${{ steps.target.outputs.env }}
        run: |
          echo "Shipping to $TARGET_ENV ($TARGET_HOST)"
          ssh-keyscan -H "$TARGET_HOST" >> /root/.ssh/known_hosts 2>/dev/null || true
          mkdir -p /tmp/dca-build && cd /tmp/dca-build
          docker save bitcoiners-dca:latest -o dca.tar
          docker save bitcoiners-provisioner:latest -o provisioner.tar
          # Compress on the wire — Hetzner is across the public internet
          # and Hetzner-bound 600MB uncompressed every CI run is wasteful.
          gzip -1 dca.tar provisioner.tar
          scp -o StrictHostKeyChecking=no \
            -i /root/.ssh/deploy_key \
            dca.tar.gz provisioner.tar.gz root@${TARGET_HOST}:/tmp/
          # Pull the host-side git clone before recreating the provisioner.
          # The compose file + provision.sh + tenant compose template all
          # live in /opt/bitcoiners-dca on the target — they're bind-mounted
          # into the provisioner container, so a fresh image without a
          # fresh source tree means new provisioning runs old code. This
          # step makes the host's working tree match origin/<branch>:
          #   main  → Hetzner /opt/bitcoiners-dca (origin/main)
          #   dev   → home   /opt/bitcoiners-dca (origin/dev)
          # `git reset --hard` is safe because no one edits these checkouts
          # manually — they exist purely for the provisioner to read.
          ssh -o StrictHostKeyChecking=no \
            -i /root/.ssh/deploy_key \
            root@${TARGET_HOST} '
              gunzip -c /tmp/dca.tar.gz | docker load
              gunzip -c /tmp/provisioner.tar.gz | docker load
              rm /tmp/dca.tar.gz /tmp/provisioner.tar.gz
              cd /opt/bitcoiners-dca
              git fetch origin
              branch="$(git rev-parse --abbrev-ref HEAD)"
              git reset --hard "origin/${branch}"
              echo "host repo now at $(git log -1 --oneline)"
              # Restart provisioner so it picks up its new image AND any
              # changes in the bind-mounted hosted/ tree.
              cd hosted && \
                IMAGE_TAG=bitcoiners-provisioner:latest \
                docker compose -f docker-compose.provisioner.yml up -d --force-recreate
            '
          # Clean up the key from this ephemeral job container.
          shred -u /root/.ssh/deploy_key 2>/dev/null || rm -f /root/.ssh/deploy_key
