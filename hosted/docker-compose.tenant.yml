# Per-tenant Docker Compose template.
#
# This file is rendered into `tenants/<tenant_id>/docker-compose.yml` by
# `hosted/provision.sh`. Each tenant gets:
#   - their own daemon container (bound to tenant data dir)
#   - their own dashboard container (on the shared `bitcoiners-app` network)
#   - their own config.yaml + .env
#   - their own SQLite DB at tenants/<tenant_id>/data/
#
# Routing model:
#   - The dashboard is reachable inside the Docker network as
#     `bitcoiners-dca-<tenant_id>-dashboard:8000` — bitcoiners-app proxies
#     to that hostname via Docker DNS.
#   - For local admin/debug access, we ALSO bind to 127.0.0.1:<TENANT_DASH_PORT>.
#
# Required substitutions (provision.sh does this with `envsubst`):
#   TENANT_ID         — e.g. "ben-prod" — used in container names + volumes
#   TENANT_DATA_DIR   — absolute path on host, e.g. /opt/bitcoiners-dca/tenants/ben-prod
#   TENANT_DASH_PORT  — unique localhost debug port, e.g. 8101
#   IMAGE_TAG         — e.g. "ghcr.io/jiashanlu/bitcoiners-dca:0.5.0"

services:
  daemon:
    image: ${IMAGE_TAG}
    container_name: bitcoiners-dca-${TENANT_ID}-daemon
    restart: unless-stopped
    # Hard limits so a single misbehaving tenant can't OOM the LXC.
    # 256MB was too tight: the daemon idles at ~110MB but spikes well past
    # 256MB during simultaneous health checks across 3 exchanges (ccxt
    # connection pools + httpx + asyncio). Phase 1 testing showed
    # reproducible OOM kills every ~75s (exitCode 137, "container oom"
    # in docker events — note Docker's State.OOMKilled flag is lossy and
    # reports false even when the kernel oom-kills). Raised to 512MB,
    # then 1GB on 2026-05-24 after the HH:00 daemon-kill pattern was
    # traced to memory pressure during cycle execution. At 512m, idle
    # was ~78% (398/512); cycle peak (multi-hop router + place_limit_buy
    # + ccxt clients for OKX/Binance/BitOasis) pushed past the cap and
    # the kernel pressure-stall reaper killed the python worker thread.
    # 1g gives ~3× headroom (~25% idle utilization). ~10 tenants per
    # LXC still within budget on a 16GB host.
    mem_limit: 1g
    memswap_limit: 1g
    cpus: 0.5
    pids_limit: 200
    command: ["run", "--config", "/app/config/config.yaml"]
    # Must exceed the scheduler's SHUTDOWN_CYCLE_WAIT_SECONDS (120s) so a
    # deploy's force-recreate doesn't SIGKILL the daemon while it waits
    # for an in-flight maker cycle to finish (audit 2026-06-10 P2).
    stop_grace_period: 150s
    volumes:
      - ${TENANT_DATA_DIR}/config:/app/config:ro
      - ${TENANT_DATA_DIR}/data:/app/data
      - ${TENANT_DATA_DIR}/reports:/app/reports
    env_file:
      - ${TENANT_DATA_DIR}/.env
    networks:
      - default
    labels:
      - "bitcoiners-dca.tenant=${TENANT_ID}"
    # Heartbeat-freshness healthcheck (audit 2026-06-10 P2): the old
    # file-existence test passed forever once the DB existed — a stalled
    # daemon looked healthy indefinitely. The scheduler writes
    # daemon.last_heartbeat_at every 5 minutes; >15 min stale = unhealthy.
    # A tenant with no heartbeat row yet (creds not configured, daemon
    # idling pre-scheduler) stays healthy — stale detection only arms
    # after the first heartbeat.
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sqlite3,sys\nfrom datetime import datetime,timezone\np='/app/data/dca.db'\nsys.exit(1) if not os.path.exists(p) else None\ntry:\n    r=sqlite3.connect(p).execute(\"SELECT value FROM meta WHERE key='daemon.last_heartbeat_at'\").fetchone()\nexcept Exception:\n    sys.exit(0)\nsys.exit(0 if not (r and r[0]) else (0 if (datetime.now(timezone.utc)-datetime.fromisoformat(r[0])).total_seconds()<900 else 1))"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s

  dashboard:
    image: ${IMAGE_TAG}
    container_name: bitcoiners-dca-${TENANT_ID}-dashboard
    restart: unless-stopped
    # Dashboard handles a single operator's session; uvicorn + jinja
    # stays well under 256MB at idle but the route-audit page can spike
    # while loading multi-exchange tickers. 384MB gives headroom without
    # eating the daemon's budget.
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 0.5
    pids_limit: 200
    command:
      - "dashboard"
      - "--config"
      - "/app/config/config.yaml"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    environment:
      # Refuse any request missing the CF Access proxy header. The only
      # path that reaches the dashboard is bitcoiners-app's per-user proxy
      # at /dca/console/, which sets cf-access-authenticated-user-email.
      # Belt-and-suspenders on top of the ufw allow-list — if either layer
      # is misconfigured, requests fail closed.
      DCA_REQUIRE_CF_HEADER: "1"
      # Per-tenant email gate (audit B-P1-6). The dashboard refuses
      # any CF-Access-authenticated request where the email doesn't
      # match this value — defence against a mis-scoped CF Access
      # policy granting cross-tenant access. provision.sh substitutes
      # ${TENANT_OWNER_EMAIL} at tenant-bootstrap time.
      DCA_TENANT_OWNER_EMAIL: "${TENANT_OWNER_EMAIL}"
      # CSRF middleware whitelists these hosts as valid Origin/Referer
      # in addition to the tenant's own hostname. The bot dashboard is
      # iframed inside `app.bitcoiners.ae/dca/console/`, so legitimate
      # form POSTs from the iframe arrive with Origin/Referer set to
      # the parent host, not the tenant's. Only honoured when the
      # cf-access-authenticated-user-email header is also present.
      DCA_TRUSTED_PROXY_HOSTS: "app.bitcoiners.ae,dev-app.bitcoiners.ae"
    ports:
      # Bind address is environment-specific (audit 2026-06-10 P2 —
      # 0.0.0.0 on Hetzner published every tenant dashboard on the public
      # IP, leaving only the CF-header app gate between the internet and
      # customer trade data):
      #   Hetzner prod: default 127.0.0.1 — cloudflared (host service)
      #     reaches it on loopback; nothing else needs the port.
      #   Home dev (tenants-LXC): set TENANT_DASH_BIND=0.0.0.0 in the
      #     tenant .env — bitcoiners-app sits on a DIFFERENT LXC and
      #     reaches the dashboard over the LAN; ufw restricts the port to
      #     the bitcoiners-app source IP.
      - "${TENANT_DASH_BIND:-127.0.0.1}:${TENANT_DASH_PORT}:8000"
    volumes:
      # Dashboard writes to all three: config edits (strategy YAML),
      # secrets DB (Fernet-encrypted credentials), reports (tax CSV
      # generation). Read-only mounts here crash the SQLite + ConfigWriter
      # paths on first use.
      - ${TENANT_DATA_DIR}/config:/app/config
      - ${TENANT_DATA_DIR}/data:/app/data
      - ${TENANT_DATA_DIR}/reports:/app/reports
    env_file:
      - ${TENANT_DATA_DIR}/.env
    depends_on:
      - daemon
    networks:
      # `default` = per-tenant bridge (dashboard ↔ daemon). `tenants` = the
      # shared external network Caddy lives on; the dashboard MUST join it so
      # Caddy can reverse-proxy `<tenant>.tenants.bitcoiners.ae` →
      # `bitcoiners-dca-${TENANT_ID}-dashboard:8000` by container name. Without
      # this the dashboard sits on its own `<tenant>_default` net and Caddy
      # 502s — every Vercel /dca/console request fails with "tenant routing
      # misconfigured". (Provisioner P0 fix 2026-06-03.)
      - default
      - tenants
    labels:
      - "bitcoiners-dca.tenant=${TENANT_ID}"
    healthcheck:
      # FastAPI /healthz only accepts GET; wget --spider sends HEAD → 405 →
      # container marked "unhealthy" forever. Use a GET + content check.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/healthz | grep -q ok"]
      interval: 60s
      timeout: 5s
      retries: 3

networks:
  # Per-tenant bridge network (compose creates `<tenant>_default`).
  default:
  # Shared external network Caddy uses to reach tenant dashboards. Pre-created
  # on the Hetzner host by Caddy's compose; on home tenants-LXC by
  # setup_tenants_lxc.sh. `external: true` → compose attaches, never creates.
  tenants:
    external: true
