# Provisioner microservice — runs on the tenants-LXC, binds 0.0.0.0:8500
# on the host. bitcoiners-app (on a different LXC) reaches it via the LAN
# IP. The tenants-LXC firewall restricts port 8500 to the bitcoiners-app
# source IP only.
#
# Requires on the host:
#   /var/run/docker.sock         — to start tenant compose stacks
#   /opt/bitcoiners-dca          — the cloned repo (provision.sh, templates)
#   /etc/bitcoiners-dca/keys     — license-signing private key (PEM)
#   /etc/bitcoiners-dca/provisioner.env — PROVISIONER_SHARED_SECRET=...,
#                                          PROVISIONER_TENANT_HOSTNAME=<lan-ip>

services:
  provisioner:
    image: bitcoiners-provisioner:latest
    container_name: bitcoiners-provisioner
    restart: unless-stopped
    ports:
      - "0.0.0.0:8500:8500"
    env_file:
      - /etc/bitcoiners-dca/provisioner.env
    environment:
      PROVISIONER_HOSTED_DIR: /opt/bitcoiners-dca/hosted
      PROVISION_BASE_DIR: /opt/bitcoiners-dca
      PROVISION_NGINX_DIR: /etc/nginx/conf.d
      PROVISION_PRIVATE_KEY: /etc/bitcoiners-dca/keys/license_signing.pem
      PROVISION_IMAGE_TAG: bitcoiners-dca:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/bitcoiners-dca:/opt/bitcoiners-dca
      - /etc/bitcoiners-dca:/etc/bitcoiners-dca:ro
    # On the Hetzner host, Caddy lives on the `tenants` network and proxies
    # `provisioner.bitcoiners.ae` → `bitcoiners-provisioner:8500`. The
    # provisioner must therefore be reachable on the `tenants` network too,
    # not just the compose default — otherwise Caddy 502s and the
    # Stripe→provisioning flow breaks for every new Pro signup. Home
    # tenants-LXC has no `tenants` network (Caddy is Hetzner-only), so we
    # mark the external network optional via `external: true` + a graceful
    # fallback below.
    networks:
      - default
      - tenants
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8500/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  # Compose default — bridge network created per-stack.
  default:
  # External `tenants` network. Pre-created on the Hetzner host by Caddy's
  # docker-compose.yml; pre-created on home tenants-LXC by the bootstrap
  # script (setup_tenants_lxc.sh) so this compose file is identical across
  # hosts. `external: true` means compose won't try to create or destroy
  # it, just attach.
  tenants:
    external: true
