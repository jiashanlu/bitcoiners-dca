<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{% block title %}bitcoiners-dca{% endblock %}</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0a0a;
  --bg-card: #111;
  --border: #222;
  --text: #f5f5f5;
  --text-muted: #888;
  --accent: #F7931A;
  --accent-soft: rgba(247,147,26,0.1);
  --ok: #5cbb84;
  --warn: #f0b000;
  --err: #e0524a;
  --info: #7aa9ff;
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, Inter, sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 0;
  min-height: 100vh;
}
.layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: 100vh;
}
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
}
.sidebar {
  background: #060606;
  border-right: 1px solid var(--border);
  padding: 24px 0;
}
.sidebar .brand {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.02em;
  padding: 0 24px 24px;
  border-bottom: 1px solid var(--border);
}
.sidebar nav { padding: 16px 0; }
.sidebar nav a {
  display: block;
  padding: 10px 24px;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 14px;
  border-left: 3px solid transparent;
  transition: all 0.15s;
}
.sidebar nav a:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.sidebar nav a.active {
  color: var(--accent);
  background: var(--accent-soft);
  border-left-color: var(--accent);
}
.sidebar .user {
  font-size: 12px;
  color: var(--text-muted);
  padding: 12px 24px;
  border-top: 1px solid var(--border);
  word-break: break-all;
}
.main { padding: 32px; max-width: 1200px; }
.main h1 {
  font-size: 30px;
  font-weight: 800;
  letter-spacing: -0.03em;
  margin: 0 0 4px;
}
.main .subtitle { color: var(--text-muted); margin-bottom: 32px; }
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 32px;
}
.stat {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
}
.stat .label {
  color: var(--text-muted);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.stat .val {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.02em;
}
.stat .unit { font-size: 13px; color: var(--text-muted); margin-left: 4px; }
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 24px;
}
.card h2 {
  font-size: 18px;
  font-weight: 700;
  margin: 0 0 16px;
  color: var(--accent);
}
.card p.help { color: var(--text-muted); font-size: 13px; margin: 0 0 16px; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th {
  text-align: left;
  padding: 10px 12px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
  font-size: 10px;
  letter-spacing: 1px;
}
td { padding: 10px 12px; border-bottom: 1px solid #181818; }
.form-row { display: grid; grid-template-columns: 200px 1fr; gap: 12px; align-items: center; margin-bottom: 12px; }
.form-row label { color: var(--text-muted); font-size: 13px; }
.form-row input, .form-row select, .form-row textarea {
  background: #050505;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 14px;
  font-family: inherit;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.form-row small {
  grid-column: 2;
  color: var(--text-muted);
  font-size: 12px;
}
/* Pro-locked overlay rows on the strategy page (Free tier). */
.form-row.locked label,
.form-row.locked small {
  opacity: 0.55;
  cursor: not-allowed;
}
.pro-lock {
  display: inline-block;
  margin-left: 8px;
  padding: 1px 8px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  vertical-align: middle;
}
.upgrade-pitch {
  margin-top: 16px;
  padding: 12px 16px;
  background: var(--accent-soft);
  border: 1px solid rgba(247, 147, 26, 0.3);
  border-radius: 8px;
  font-size: 13px;
  color: var(--text);
  line-height: 1.55;
}
.upgrade-pitch a { color: var(--accent); font-weight: 600; }
button, .btn {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 9px 16px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
}
button:hover { filter: brightness(1.1); }
button.secondary, .btn.secondary {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.flash {
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 14px;
}
.flash.ok { background: rgba(92,187,132,0.1); border: 1px solid var(--ok); color: var(--ok); }
.flash.err { background: rgba(224,82,74,0.1); border: 1px solid var(--err); color: var(--err); }
.flash.warn { background: rgba(240,176,0,0.1); border: 1px solid var(--warn); color: var(--warn); }
.pill {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.pill.ok { background: rgba(92,187,132,0.15); color: var(--ok); }
.pill.warn { background: rgba(240,176,0,0.15); color: var(--warn); }
.pill.err { background: rgba(224,82,74,0.15); color: var(--err); }
.pill.muted { background: #1a1a1a; color: var(--text-muted); }
.pill.accent { background: var(--accent-soft); color: var(--accent); }
.muted { color: var(--text-muted); }
.mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
code, .mono {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 13px;
}
a { color: var(--accent); text-decoration: none; }
.empty { text-align: center; color: var(--text-muted); padding: 30px; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">🟧 bitcoiners-dca</div>
    <nav>
      <a href="/" {% if active == "overview" %}class="active"{% endif %}>Overview</a>
      <a href="/strategy" {% if active == "strategy" %}class="active"{% endif %}>Strategy</a>
      <a href="/exchanges" {% if active == "exchanges" %}class="active"{% endif %}>Exchanges</a>
      <a href="/balances" {% if active == "balances" %}class="active"{% endif %}>Balances</a>
      <a href="/prices" {% if active == "prices" %}class="active"{% endif %}>Prices</a>
      <a href="/trades" {% if active == "trades" %}class="active"{% endif %}>Trades</a>
      <a href="/routes-audit" {% if active == "routes" %}class="active"{% endif %}>Routes</a>
      <a href="/settings" {% if active == "settings" %}class="active"{% endif %}>Settings</a>
    </nav>
    <div class="user">
      <div>Signed in as</div>
      <strong>{{ user_email }}</strong>
      <div style="margin-top:6px"><span class="pill {% if license_tier == 'pro' or license_tier == 'business' %}accent{% else %}muted{% endif %}">{{ license_tier }}</span></div>
    </div>
  </aside>
  <main class="main">
    {% if flash %}<div class="flash {{ flash.kind }}">{{ flash.message }}</div>{% endif %}
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
